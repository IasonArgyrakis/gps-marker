<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Mark your GPS location on a map and export as JSON">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>GPS Marker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <!-- Crosshair overlay -->
  <div id="crosshair">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="6" stroke="#ff5252" stroke-width="2" fill="none"/>
      <line x1="24" y1="4" x2="24" y2="16" stroke="#ff5252" stroke-width="2"/>
      <line x1="24" y1="32" x2="24" y2="44" stroke="#ff5252" stroke-width="2"/>
      <line x1="4" y1="24" x2="16" y2="24" stroke="#ff5252" stroke-width="2"/>
      <line x1="32" y1="24" x2="44" y2="24" stroke="#ff5252" stroke-width="2"/>
    </svg>
  </div>

  <div id="controls">
    <button id="btn-locate" title="Get current location">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
    </button>
    <button id="btn-mark" title="Drop pin at crosshair">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
    </button>
    <button id="btn-list" title="View saved locations">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <button id="btn-export" title="Export JSON">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
    </button>
  </div>

  <div id="status-bar">Ready</div>

  <!-- Locations panel -->
  <div id="panel" class="hidden">
    <div id="panel-header">
      <h2>Saved Locations</h2>
      <button id="btn-close-panel">&times;</button>
    </div>
    <div id="panel-body">
      <p id="empty-msg">No locations saved yet.</p>
      <ul id="location-list"></ul>
    </div>
    <div id="panel-footer">
      <button id="btn-clear-all">Clear All</button>
      <button id="btn-export-panel">Export JSON</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
